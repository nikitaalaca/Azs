<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAoMntaBJd9YJd9PzrTao0dvl1sPbFYVMI",
    authDomain: "project-3797590376463361850.firebaseapp.com",
    databaseURL: "https://project-3797590376463361850-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "project-3797590376463361850",
    storageBucket: "project-3797590376463361850.firebasestorage.app",
    messagingSenderId: "995163864050",
    appId: "1:995163864050:web:9f98757570e34afff4496b"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  const FUEL_TYPES = ['АИ-92', 'АИ-95', 'АИ-98', 'ДТ', 'Газ'];
  let currentLat = null;
  let currentLon = null;
  let currentCity = '';
  let editingStationId = null;
  let allStations = [];
  let searchQuery = '';
  let showOnlyWithQueue = false;
  let isSearching = false;

  // Определение темы
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
  document.body.className = systemDark.matches ? 'dark' : 'light';
  systemDark.addEventListener('change', (e) => {
    document.body.className = e.matches ? 'dark' : 'light';
  });

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function calcDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function getFreshnessWeight(updatedAt) {
    if (!updatedAt) return 0;
    return Math.max(0, Math.pow(2, -(Date.now() - updatedAt) / 60000 / 30));
  }

  // Геокодирование адреса в координаты
  async function geocodeAddress(address) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&accept-language=ru`
      );
      const data = await response.json();
      if (data && data.length > 0) {
        return {
          lat: parseFloat(data[0].lat),
          lon: parseFloat(data[0].lon),
          displayName: data[0].display_name
        };
      }
      return null;
    } catch (e) {
      console.error('Ошибка геокодирования:', e);
      return null;
    }
  }

  // Получение адреса по координатам
  async function reverseGeocode(lat, lon) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru&zoom=18`
      );
      const data = await response.json();
      if (data && data.display_name) {
        return data.display_name;
      }
      return null;
    } catch (e) {
      return null;
    }
  }

  // Получение города
  async function getCityFromCoords(lat, lon) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru&zoom=10`
      );
      const data = await response.json();
      return data?.address?.city || data?.address?.town || data?.address?.village || 'Рядом';
    } catch (e) {
      return 'Рядом';
    }
  }

  // Поиск АЗС в заданной области
  async function searchStationsInArea(lat, lon, radius = 10) {
    try {
      const query = `
        [out:json];
        (
          node["amenity"="fuel"](around:${radius * 1000}, ${lat}, ${lon});
          way["amenity"="fuel"](around:${radius * 1000}, ${lat}, ${lon});
          relation["amenity"="fuel"](around:${radius * 1000}, ${lat}, ${lon});
        );
        out center 100;
      `;
      
      const response = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: query
      });
      
      if (!response.ok) throw new Error('API error');
      
      const data = await response.json();
      return data.elements || [];
    } catch (error) {
      console.error('Ошибка поиска АЗС:', error);
      return [];
    }
  }

  // Сохранение станций в Firebase
  async function saveStationsToFirebase(elements) {
    for (const element of elements) {
      const stationLat = element.lat || element.center?.lat;
      const stationLon = element.lon || element.center?.lon;
      
      if (!stationLat || !stationLon) continue;
      
      const name = element.tags?.name || element.tags?.brand || element.tags?.operator || 'АЗС';
      const osmId = element.id?.toString() || `${stationLat},${stationLon}`;
      const firebaseId = osmId.replace(/[\/.]/g, '_');
      
      const stationRef = ref(database, `stations/${firebaseId}`);
      const snapshot = await get(stationRef);
      const existingData = snapshot.val();
      
      const updates = {};
      updates[`stations/${firebaseId}/name`] = name;
      updates[`stations/${firebaseId}/lat`] = stationLat;
      updates[`stations/${firebaseId}/lon`] = stationLon;
      
      if (!existingData || !existingData.address) {
        const address = await reverseGeocode(stationLat, stationLon);
        if (address) {
          updates[`stations/${firebaseId}/address`] = address;
        }
      }
      
      if (!existingData || !existingData.fuels) {
        const defaultFuels = {};
        FUEL_TYPES.forEach(f => defaultFuels[f] = true);
        updates[`stations/${firebaseId}/fuels`] = defaultFuels;
      }
      
      await update(ref(database), updates);
    }
  }

  // Загрузка станций из Firebase
  function listenToStations() {
    const stationsRef = ref(database, 'stations');
    
    onValue(stationsRef, (snapshot) => {
      const data = snapshot.val();
      const stations = [];
      
      if (data) {
        Object.keys(data).forEach(key => {
          stations.push({
            id: key,
            ...data[key]
          });
        });
      }
      
      allStations = stations;
      renderFilteredStations();
    });
  }

  // Основная функция поиска
  async function performSearch() {
    const query = searchQuery.trim();
    const locationBtn = document.getElementById('locationBtn');
    
    if (!query && !currentLat) {
      requestGeolocation();
      return;
    }

    isSearching = true;
    locationBtn.classList.add('loading');
    document.getElementById('stationsContainer').innerHTML = `
      <div class="empty-state">
        <i class="fas fa-search fa-spin"></i>
        <h3>Ищем АЗС...</h3>
        <p>${query ? `По запросу: "${query}"` : 'В вашем районе'}</p>
      </div>
    `;

    try {
      let searchLat = currentLat;
      let searchLon = currentLon;
      let searchRadius = 10;

      if (query) {
        // Геокодируем запрос
        const geocodeResult = await geocodeAddress(query);
        if (geocodeResult) {
          searchLat = geocodeResult.lat;
          searchLon = geocodeResult.lon;
          document.getElementById('locationLabel').textContent = query;
          searchRadius = 5;
        } else if (!currentLat) {
          showToast('Местоположение не найдено. Уточните запрос.');
          return;
        }
      }

      // Ищем АЗС
      const elements = await searchStationsInArea(searchLat, searchLon, searchRadius);
      
      if (elements.length === 0) {
        // Расширяем радиус поиска
        const extendedElements = await searchStationsInArea(searchLat, searchLon, 20);
        if (extendedElements.length > 0) {
          await saveStationsToFirebase(extendedElements);
          showToast(`Найдено ${extendedElements.length} АЗС в радиусе 20 км`);
        } else {
          showToast('АЗС не найдены. Попробуйте другой запрос.');
        }
      } else {
        await saveStationsToFirebase(elements);
        showToast(`Найдено ${elements.length} АЗС`);
      }

      if (!query && searchLat === currentLat) {
        const city = await getCityFromCoords(searchLat, searchLon);
        document.getElementById('locationLabel').textContent = city;
      }

    } catch (error) {
      console.error('Ошибка поиска:', error);
      showToast('Ошибка поиска. Проверьте подключение.');
    } finally {
      isSearching = false;
      locationBtn.classList.remove('loading');
    }
  }

  // Запрос геолокации
  function requestGeolocation() {
    const locationBtn = document.getElementById('locationBtn');
    locationBtn.classList.add('loading');
    document.getElementById('locationLabel').textContent = 'Определение...';

    if (!navigator.geolocation) {
      showToast('Геолокация не поддерживается');
      locationBtn.classList.remove('loading');
      return;
    }

    navigator.geolocation.getCurrentPosition(
      async (position) => {
        currentLat = position.coords.latitude;
        currentLon = position.coords.longitude;
        
        const city = await getCityFromCoords(currentLat, currentLon);
        document.getElementById('locationLabel').textContent = city;
        
        await performSearch();
        locationBtn.classList.remove('loading');
      },
      (error) => {
        console.error('Ошибка геолокации:', error);
        document.getElementById('locationLabel').textContent = 'Включите геолокацию';
        locationBtn.classList.remove('loading');
        
        // Предлагаем ввести город вручную
        document.getElementById('searchInput').placeholder = 'Введите город для поиска АЗС...';
        showToast('Введите город или адрес для поиска');
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  }

  function renderFilteredStations() {
    let filtered = [...allStations].filter(s => s.lat && s.lon);
    
    // Текстовый поиск по названию и адресу
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(s => 
        (s.name && s.name.toLowerCase().includes(q)) ||
        (s.address && s.address.toLowerCase().includes(q))
      );
    }
    
    // Фильтр по наличию очереди
    if (showOnlyWithQueue) {
      filtered = filtered.filter(s => s.queue && s.queueUpdatedAt);
    }
    
    // Сортировка по расстоянию
    if (currentLat && currentLon) {
      filtered.sort((a, b) => {
        return calcDistance(currentLat, currentLon, a.lat, a.lon) - 
               calcDistance(currentLat, currentLon, b.lat, b.lon);
      });
    }
    
    document.getElementById('stationsCount').textContent = `${filtered.length} АЗС`;
    renderStations(filtered);
  }

  function renderStations(stations) {
    const container = document.getElementById('stationsContainer');
    
    if (isSearching) return;
    
    if (!stations.length) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-map-marker-alt"></i>
          <h3>Ничего не найдено</h3>
          <p>${searchQuery ? 'Попробуйте изменить запрос' : 'Введите город или адрес для поиска'}</p>
        </div>
      `;
      return;
    }

    container.innerHTML = stations.map(station => {
      const distance = (currentLat && currentLon) 
        ? calcDistance(currentLat, currentLon, station.lat, station.lon).toFixed(1)
        : null;
      
      const weight = getFreshnessWeight(station.queueUpdatedAt);
      const queueText = station.queue 
        ? { low: 'Маленькая', medium: 'Средняя', high: 'Большая' }[station.queue] 
        : 'Нет данных';
      const queueClass = station.queue ? `queue-${station.queue}` : 'queue-none';
      
      const timeAgo = station.queueUpdatedAt 
        ? Math.floor((Date.now() - station.queueUpdatedAt) / 60000) 
        : null;
      
      const fuels = station.fuels || {};
      const fuelsHtml = FUEL_TYPES.map(type => {
        const available = fuels[type] !== false;
        return `<span class="fuel-chip ${available ? 'available' : 'missing'}">
          ${type} <i class="fas fa-${available ? 'check' : 'times'}"></i>
        </span>`;
      }).join('');

      return `
        <div class="station-card">
          <div class="station-top">
            <div class="station-info">
              <div class="station-name">
                ${station.name || 'АЗС'}
                ${station.name && station.name.includes('Газпром') ? '<span class="brand-badge">Газпром</span>' : ''}
                ${station.name && station.name.includes('Лукойл') ? '<span class="brand-badge">Лукойл</span>' : ''}
                ${station.name && station.name.includes('Роснефть') ? '<span class="brand-badge">Роснефть</span>' : ''}
              </div>
              ${station.address ? `<div class="station-address">${station.address}</div>` : ''}
            </div>
            ${distance ? `<span class="distance-badge">${distance} км</span>` : ''}
          </div>
          <div class="queue-section">
            <span class="queue-badge ${queueClass}">
              <i class="fas fa-users"></i> ${queueText}
            </span>
            ${timeAgo ? `<span class="queue-time">${timeAgo} мин назад</span>` : ''}
            ${weight > 0 && weight < 0.6 ? '<span class="queue-time">Уточняется</span>' : ''}
          </div>
          <div class="fuel-row">${fuelsHtml}</div>
          <button class="update-btn" data-station-id="${station.id}">
            <i class="fas fa-pen"></i> Обновить информацию
          </button>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.update-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const stationId = btn.dataset.stationId;
        openEditModal(stationId);
      });
    });
  }

  function openEditModal(stationId) {
    const station = allStations.find(s => s.id === stationId);
    if (!station) return;
    
    editingStationId = stationId;
    document.getElementById('modalStationTitle').textContent = station.name || 'АЗС';
    
    document.querySelectorAll('#queueOptions .queue-opt').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.queue === station.queue);
    });
    
    const fuelContainer = document.getElementById('fuelCheckboxes');
    const fuels = station.fuels || {};
    fuelContainer.innerHTML = FUEL_TYPES.map(type => {
      const checked = fuels[type] !== false;
      return `<label class="fuel-check">
        <input type="checkbox" data-fuel="${type}" ${checked ? 'checked' : ''}> ${type}
      </label>`;
    }).join('');
    
    document.getElementById('editModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
    editingStationId = null;
  }

  async function saveToFirebase(stationId, queue, fuels) {
    try {
      const updates = {};
      updates[`stations/${stationId}/queue`] = queue || null;
      updates[`stations/${stationId}/queueUpdatedAt`] = Date.now();
      updates[`stations/${stationId}/fuels`] = fuels;
      
      await update(ref(database), updates);
      showToast('Данные сохранены и видны всем');
    } catch (error) {
      console.error('Ошибка сохранения:', error);
      showToast('Ошибка сохранения');
    }
  }

  // Обработчики событий
  document.getElementById('locationBtn').addEventListener('click', requestGeolocation);

  document.getElementById('searchBtn').addEventListener('click', () => {
    searchQuery = document.getElementById('searchInput').value.trim();
    performSearch();
  });

  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      searchQuery = e.target.value.trim();
      performSearch();
    }
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    renderFilteredStations();
  });

  document.getElementById('filterBtn').addEventListener('click', () => {
    showOnlyWithQueue = !showOnlyWithQueue;
    const btn = document.getElementById('filterBtn');
    btn.classList.toggle('active', showOnlyWithQueue);
    renderFilteredStations();
  });

  document.getElementById('queueOptions').addEventListener('click', (e) => {
    const opt = e.target.closest('.queue-opt');
    if (!opt) return;
    document.querySelectorAll('#queueOptions .queue-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });

  document.getElementById('saveModalBtn').addEventListener('click', async () => {
    if (!editingStationId) return;
    
    const selectedQueue = document.querySelector('#queueOptions .queue-opt.selected')?.dataset.queue || null;
    const fuels = {};
    
    document.querySelectorAll('#fuelCheckboxes input').forEach(checkbox => {
      fuels[checkbox.dataset.fuel] = checkbox.checked;
    });
    
    await saveToFirebase(editingStationId, selectedQueue, fuels);
    closeModal();
  });

  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  
  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editModal')) closeModal();
  });

  // Запуск
  listenToStations();
  
  // Автоматически запрашиваем геолокацию при загрузке
  setTimeout(() => {
    if (!currentLat) {
      requestGeolocation();
    }
  }, 500);
</script>
</body>
</html>
