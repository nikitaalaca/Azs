<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>АЗС • Очереди и топливо</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      margin: 0;
      transition: background 0.3s ease;
    }

    body.light {
      background: #f2f2f7;
    }

    body.dark {
      background: #000000;
    }

    .app {
      max-width: 430px;
      width: 100%;
      height: 820px;
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: all 0.3s ease;
    }

    body.light .app {
      background: #ffffff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }

    body.dark .app {
      background: #0d0d0f;
      box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 {

      font-weight: 700;
      letter-spacing: -0.5px;

    }

    body.light .header h1 {

    }

    body.dark .header h1 {
      color: #ffffff;
    }

    .header h1 i {
      color: #ff9500;
      font-size: 24px;
    }

    .location-badge {
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    body.light .location-badge {
      background: #f2f2f7;
      color: #1d1d1f;
    }

    body.dark .location-badge {
      background: rgba(255,255,255,0.1);
      color: #e5e5e7;
    }

    .location-badge i {
      color: #ff9500;
    }

    .status-bar {
      margin: 0 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      flex-wrap: wrap;
      gap: 8px;
    }

    body.light .status-bar {

    }

    body.dark .status-bar {
      color: #98989e;
    }

    .connection-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30d158;
    }

    .connection-dot.offline {
      background: #ff453a;
    }

    .refresh-btn {
      border: none;
      font-weight: 500;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }

    body.light .refresh-btn {
      background: #f2f2f7;

    }

    body.dark .refresh-btn {
      background: rgba(255,255,255,0.08);

    }

    .refresh-btn:active {
      opacity: 0.7;
    }

    .stations-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .station-card {
      border-radius: 20px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: 0.2s;
    }

    body.light .station-card {
      background: #ffffff;
      border: 1px solid #e5e5ea;
    }

    body.dark .station-card {
      background: #1c1c1e;
      border: 1px solid #2c2c2e;
    }

    .station-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .station-info {
      flex: 1;
    }

    .station-name {
      font-weight: 600;

    body.light .station-name {

    body.dark .station-name {

    .station-address {

    body.light .station-address {

    }

    body.dark .station-address {

    }

    .distance {
      font-size: 12px;

      padding: 4px 10px;
      border-radius: 16px;
      white-space: nowrap;
    }

    body.light .distance {

    }

    body.dark .distance {
      color: #aeaeb2;
      background: rgba(255,255,255,0.06);
    }

    .queue-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .queue-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
    }

    .queue-low {
      background: rgba(48,209,88,0.12);
      color: #248a3d;
    }

    body.dark .queue-low {
      background: rgba(48,209,88,0.15);
      color: #30d158;
    }

    .queue-medium {
      background: rgba(255,159,10,0.12);
      color: #cc7a00;
    }

    body.dark .queue-medium {

    }

    .queue-high {
      background: rgba(255,69,58,0.12);

    }

    body.dark .queue-high {
      background: rgba(255,69,58,0.15);
      color: #ff453a;
    }

    .queue-none {
      background: rgba(142,142,147,0.1);

    }

    body.dark .queue-none {
      background: rgba(142,142,147,0.1);

    }

    .time-ago {
      font-size: 11px;
    }

    body.light .time-ago {

    }

    body.dark .time-ago {

    }

    .fuel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .fuel-tag {
      border-radius: 16px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    body.light .fuel-tag {
      background: #f2f2f7;
      color: #3a3a3c;
    }

    body.dark .fuel-tag {
      background: rgba(255,255,255,0.06);
      color: #d1d1d6;
    }

    .fuel-tag.available i {
      color: #30d158;
      font-size: 10px;
    }

    .fuel-tag.missing {
      opacity: 0.4;
      text-decoration: line-through;
    }

    .fuel-tag.missing i {
      color: #ff453a;
      font-size: 10px;
    }

    .update-btn {
      background: #ff9500;
      border: none;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: 0.2s;
      margin-top: 2px;
      font-family: 'Inter', sans-serif;
    }

    .update-btn:active {
      background: #e68600;
    }

    .footer {
      padding: 14px 20px;
      font-size: 11px;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    body.light .footer {
      color: #aeaeb2;
      border-top: 1px solid #e5e5ea;
    }

    body.dark .footer {
      color: #636366;
      border-top: 1px solid #2c2c2e;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    body.dark .modal-overlay {
      background: rgba(0,0,0,0.7);
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-sheet {
      width: 100%;
      max-width: 430px;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 30px;
      transform: translateY(100%);
      transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    body.light .modal-sheet {
      background: #ffffff;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
    }

    body.dark .modal-sheet {
      background: #1c1c1e;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
    }

    .active .modal-sheet {
      transform: translateY(0);
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    body.light .modal-handle {
      background: #d1d1d6;
    }

    body.dark .modal-handle {
      background: #48484a;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    body.light .modal-title {
      color: #1d1d1f;
    }

    body.dark .modal-title {
      color: #ffffff;
    }

    .modal-label {
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    body.light .modal-label {
      color: #6e6e73;
    }

    body.dark .modal-label {
      color: #aeaeb2;
    }

    .queue-options {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;

    .queue-opt {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
    }

    body.light .queue-opt {
      background: #f2f2f7;
      color: #3a3a3c;
    }

    body.dark .queue-opt {
      background: #2c2c2e;
      color: #ccc;
    }

    .queue-opt.selected {
      background: #ff9500;
      color: #ffffff;
      border-color: #ff9500;
    }

    .fuel-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 20px;
    }

    .fuel-check {
      padding: 10px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    body.light .fuel-check {
      background: #f2f2f7;
      color: #1d1d1f;
    }

    body.dark .fuel-check {
      background: #2c2c2e;
      color: #ffffff;
    }

    .fuel-check input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #ff9500;
    }

    .save-btn {
      background: #ff9500;
      color: #ffffff;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 28px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }

    .save-btn:active {
      background: #e68600;
    }

    .cancel-btn {
      background: transparent;
      border: none;
      color: #ff9500;
      width: 100%;
      margin-top: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .loading-state {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.6;
    }

    body.light .loading-state {
      color: #8e8e93;
    }

    body.dark .loading-state {
      color: #8e8e93;
    }

    @media (max-width: 400px) {
      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="content">
    <div class="header">
      <h1><i class="fas fa-gas-pump"></i> АЗС</h1>
      <div class="location-badge" id="locationDisplay">
        <i class="fas fa-location-dot"></i> 
        <span id="cityName">Определение...</span>
      </div>
    </div>
    <div class="status-bar">
      <div class="connection-indicator" id="connectionStatus">
        <span class="connection-dot" id="connectionDot"></span>
        <span id="connectionText">Подключение...</span>
      </div>
      <button class="refresh-btn" id="refreshGeoBtn">
        <i class="fas fa-sync-alt"></i> Обновить
      </button>
    </div>
    <div class="stations-list" id="stationsContainer">
      <div class="loading-state">
        <i class="fas fa-spinner fa-pulse" style="font-size: 24px; margin-bottom: 12px; display: block;"></i>
        Поиск ближайших АЗС...
      </div>
    </div>
    <div class="footer">
      <span>Данные актуальны 30 минут</span>
      <span>Общая база данных</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalStationTitle">АЗС</div>
    <div class="modal-label">Размер очереди:</div>
    <div class="queue-options" id="queueOptions">
      <div class="queue-opt" data-queue="low">Малая</div>
      <div class="queue-opt" data-queue="medium">Средняя</div>
      <div class="queue-opt" data-queue="high">Большая</div>
    </div>
    <div class="modal-label">Наличие топлива:</div>
    <div class="fuel-checkboxes" id="fuelCheckboxes"></div>
    <button class="save-btn" id="saveModalBtn">Сохранить</button>
    <button class="cancel-btn" id="closeModalBtn">Отмена</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAoMntaBJd9YJd9PzrTao0dvl1sPbFYVMI",
    authDomain: "project-3797590376463361850.firebaseapp.com",
    databaseURL: "https://project-3797590376463361850-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "project-3797590376463361850",
    storageBucket: "project-3797590376463361850.firebasestorage.app",
    messagingSenderId: "995163864050",
    appId: "1:995163864050:web:9f98757570e34afff4496b"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  const FUEL_TYPES = ['АИ-92', 'АИ-95', 'АИ-98', 'ДТ', 'Газ'];
  let currentLat = null;
  let currentLon = null;
  let editingStationId = null;
  let allStations = [];

  // Определение темы устройства
  function detectSystemTheme() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  }

  // Применение темы
  function applyTheme(theme) {
    document.body.className = theme;
  }

  // Инициализация темы
  const systemTheme = detectSystemTheme();
  applyTheme(systemTheme);

  // Слушаем изменения системной темы
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      applyTheme(e.matches ? 'dark' : 'light');
    });
  }

  function calcDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function getFreshnessWeight(updatedAt) {
    if (!updatedAt) return 0;
    const minutes = (Date.now() - updatedAt) / 60000;
    return Math.max(0, Math.pow(2, -minutes / 30));
  }

  function updateConnectionStatus(connected) {
    const dot = document.getElementById('connectionDot');
    const text = document.getElementById('connectionText');
    
    if (connected) {
      dot.className = 'connection-dot';
      text.textContent = 'Онлайн';
    } else {
      dot.className = 'connection-dot offline';
      text.textContent = 'Офлайн';
    }
  }

  // Получение адреса по координатам
  async function getAddressFromCoords(lat, lon) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru&zoom=18`
      );
      const data = await response.json();
      if (data && data.display_name) {
        // Обрезаем длинный адрес до читаемого
        const parts = data.display_name.split(',');
        return parts.slice(0, 3).join(',').trim();
      }
      return null;
    } catch (e) {
      return null;
    }
  }

  // Получение города по координатам
  async function getCityFromCoords(lat, lon) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru&zoom=10`
      );
      const data = await response.json();
      return data?.address?.city || 
             data?.address?.town || 
             data?.address?.village || 
             data?.address?.county || 
             'Неизвестно';
    } catch (e) {
      return 'Москва';
    }
  }

  // Слушаем изменения в Firebase
  function listenToStations() {
    const stationsRef = ref(database, 'stations');
    
    onValue(stationsRef, async (snapshot) => {
      const data = snapshot.val();
      const stations = [];
      
      if (data) {
        for (const key of Object.keys(data)) {
          const station = data[key];
          // Если нет адреса, получаем его
          if (!station.address && station.lat && station.lon) {
            const address = await getAddressFromCoords(station.lat, station.lon);
            if (address) {
              station.address = address;
              // Сохраняем адрес в Firebase
              const updates = {};
              updates[`stations/${key}/address`] = address;
              update(ref(database), updates);
            }
          }
          stations.push({
            id: key,
            ...station
          });
        }
      }
      
      allStations = stations;
      renderStations(stations);
    }, (error) => {
      console.error('Ошибка чтения из Firebase:', error);
      updateConnectionStatus(false);
    });
  }

  // Поиск реальных АЗС через OpenStreetMap
  async function fetchNearbyStations(lat, lon) {
    try {
      const query = `
        [out:json];
        (
          node["amenity"="fuel"](around:5000, ${lat}, ${lon});
          way["amenity"="fuel"](around:5000, ${lat}, ${lon});
          relation["amenity"="fuel"](around:5000, ${lat}, ${lon});
        );
        out center 20;
      `;
      
      const response = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: query
      });
      
      if (!response.ok) throw new Error('API error');
      
      const data = await response.json();
      
      for (const element of data.elements) {
        const osmId = `${element.type}/${element.id}`;
        const stationLat = element.lat || element.center?.lat;
        const stationLon = element.lon || element.center?.lon;
        
        if (!stationLat || !stationLon) continue;
        
        const name = element.tags?.name || 
                    element.tags?.brand || 
                    element.tags?.operator || 
                    'АЗС';
        
        const firebaseId = osmId.replace(/\//g, '_');
        const stationRef = ref(database, `stations/${firebaseId}`);
        const snapshot = await get(stationRef);
        const existingData = snapshot.val();
        
        const updates = {};
        updates[`stations/${firebaseId}/name`] = name;
        updates[`stations/${firebaseId}/lat`] = stationLat;
        updates[`stations/${firebaseId}/lon`] = stationLon;
        updates[`stations/${firebaseId}/osmId`] = osmId;
        
        // Получаем адрес если нет
        if (!existingData || !existingData.address) {
          const address = await getAddressFromCoords(stationLat, stationLon);
          if (address) {
            updates[`stations/${firebaseId}/address`] = address;
          }
        }
        
        // Инициализируем fuels если нет
        if (!existingData || !existingData.fuels) {
          const defaultFuels = {};
          FUEL_TYPES.forEach(f => defaultFuels[f] = true);
          updates[`stations/${firebaseId}/fuels`] = defaultFuels;
        }
        
        await update(ref(database), updates);
      }
      
      updateConnectionStatus(true);
    } catch (error) {
      console.error('Ошибка загрузки АЗС:', error);
    }
  }

  function requestGeolocation() {
    if (!navigator.geolocation) {
      document.getElementById('cityName').textContent = 'Нет доступа';
      updateConnectionStatus(false);
      return;
    }
    
    document.getElementById('cityName').textContent = 'Поиск...';
    
    navigator.geolocation.getCurrentPosition(
      async (position) => {
        currentLat = position.coords.latitude;
        currentLon = position.coords.longitude;
        
        const city = await getCityFromCoords(currentLat, currentLon);
        document.getElementById('cityName').textContent = city;
        
        await fetchNearbyStations(currentLat, currentLon);
        updateConnectionStatus(true);
      },
      (error) => {
        console.error('Ошибка геолокации:', error);
        // Используем Москву как запасной вариант
        currentLat = 55.7558;
        currentLon = 37.6173;
        document.getElementById('cityName').textContent = 'Москва';
        fetchNearbyStations(currentLat, currentLon);
        updateConnectionStatus(true);
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 300000
      }
    );
  }

  function renderStations(stations) {
    const container = document.getElementById('stationsContainer');
    
    if (!stations || !stations.length) {
      container.innerHTML = '<div class="loading-state">Нет АЗС поблизости</div>';
      return;
    }

    const sorted = [...stations]
      .filter(s => s.lat && s.lon)
      .sort((a, b) => {
        if (!currentLat || !currentLon) return 0;
        const distA = calcDistance(currentLat, currentLon, a.lat, a.lon);
        const distB = calcDistance(currentLat, currentLon, b.lat, b.lon);
        return distA - distB;
      });

    container.innerHTML = sorted.map(station => {
      const distance = (currentLat && currentLon && station.lat && station.lon) 
        ? calcDistance(currentLat, currentLon, station.lat, station.lon).toFixed(1)
        : '?';
      
      const weight = getFreshnessWeight(station.queueUpdatedAt);
      const queueText = station.queue 
        ? { low: 'Маленькая', medium: 'Средняя', high: 'Большая' }[station.queue] 
        : 'Нет данных';
      const queueClass = station.queue ? `queue-${station.queue}` : 'queue-none';
      
      const timeAgo = station.queueUpdatedAt 
        ? Math.floor((Date.now() - station.queueUpdatedAt) / 60000) 
        : null;
      
      const fuels = station.fuels || {};
      const fuelsHtml = FUEL_TYPES.map(type => {
        const available = fuels[type] !== false;
        return `<span class="fuel-tag ${available ? 'available' : 'missing'}">
          ${type}
          <i class="fas ${available ? 'fa-check' : 'fa-times'}"></i>
        </span>`;
      }).join('');

      return `
        <div class="station-card">
          <div class="station-header">
            <div class="station-info">
              <div class="station-name">${station.name || 'АЗС'}</div>
              ${station.address ? `<div class="station-address">${station.address}</div>` : ''}
            </div>
            <span class="distance">${distance} км</span>
          </div>
          <div class="queue-row">
            <span class="queue-indicator ${queueClass}">
              <i class="fas fa-users"></i> ${queueText}
            </span>
            ${weight > 0 && weight < 0.6 ? '<span class="time-ago">Уточняется</span>' : ''}
            ${timeAgo !== null ? `<span class="time-ago">${timeAgo} мин назад</span>` : ''}
          </div>
          <div class="fuel-tags">${fuelsHtml}</div>
          <button class="update-btn" data-station-id="${station.id}">
            <i class="fas fa-pen"></i> Обновить
          </button>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.update-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const stationId = btn.dataset.stationId;
        openEditModal(stationId);
      });
    });
  }

  function openEditModal(stationId) {
    const station = allStations.find(s => s.id === stationId);
    if (!station) return;
    
    editingStationId = stationId;
    document.getElementById('modalStationTitle').textContent = station.name || 'АЗС';
    
    document.querySelectorAll('#queueOptions .queue-opt').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.queue === station.queue);
    });
    
    const fuelContainer = document.getElementById('fuelCheckboxes');
    const fuels = station.fuels || {};
    fuelContainer.innerHTML = FUEL_TYPES.map(type => {
      const checked = fuels[type] !== false;
      return `<label class="fuel-check">
        <input type="checkbox" data-fuel="${type}" ${checked ? 'checked' : ''}> ${type}
      </label>`;
    }).join('');
    
    document.getElementById('editModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
    editingStationId = null;
  }

  async function saveToFirebase(stationId, queue, fuels) {
    try {
      const updates = {};
      updates[`stations/${stationId}/queue`] = queue || null;
      updates[`stations/${stationId}/queueUpdatedAt`] = Date.now();
      updates[`stations/${stationId}/fuels`] = fuels;
      
      await update(ref(database), updates);
      updateConnectionStatus(true);
    } catch (error) {
      console.error('Ошибка сохранения:', error);
      alert('Не удалось сохранить данные. Проверьте подключение к интернету.');
    }
  }

  // Обработчики событий
  document.getElementById('queueOptions').addEventListener('click', (e) => {
    const opt = e.target.closest('.queue-opt');
    if (!opt) return;
    document.querySelectorAll('#queueOptions .queue-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });

  document.getElementById('saveModalBtn').addEventListener('click', async () => {
    if (!editingStationId) return;
    
    const selectedQueue = document.querySelector('#queueOptions .queue-opt.selected')?.dataset.queue || null;
    const fuels = {};
    
    document.querySelectorAll('#fuelCheckboxes input').forEach(checkbox => {
      fuels[checkbox.dataset.fuel] = checkbox.checked;
    });
    
    await saveToFirebase(editingStationId, selectedQueue, fuels);
    closeModal();
  });

  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editModal')) closeModal();
  });

  document.getElementById('refreshGeoBtn').addEventListener('click', () => {
    requestGeolocation();
  });

  document.getElementById('locationDisplay').addEventListener('click', () => {
    requestGeolocation();
  });

  // Периодическое обновление
  setInterval(() => {
    if (currentLat && currentLon) {
      fetchNearbyStations(currentLat, currentLon);
    }
  }, 300000);

  // Мониторинг подключения
  const connectedRef = ref(database, '.info/connected');
  onValue(connectedRef, (snap) => {
    updateConnectionStatus(snap.val() === true);
  });

  // Запуск приложения
  listenToStations();
  requestGeolocation();
</script>
</body>
</html>
