<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>АЗС • Очереди и топливо</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      margin: 0;
    }

    .app {
      max-width: 430px;
      width: 100%;
      height: 820px;
      background: #0d0d0f;
      border-radius: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .app::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -30%;
      width: 160%;
      height: 160%;
      background: radial-gradient(circle at 25% 35%, rgba(255,149,0,0.15) 0%, transparent 55%),
                  radial-gradient(circle at 75% 70%, rgba(0,122,255,0.12) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: 24px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 i {
      background: linear-gradient(135deg, #ff9f0a, #ff6b00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .location-badge {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #e5e5e7;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .location-badge i {
      color: #ff9f0a;
    }

    .status-bar {
      margin: 5px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #8e8e93;
      font-size: 13px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .online-badge {
      background: rgba(48,209,88,0.15);
      color: #30d158;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .refresh-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ffffff;
      font-weight: 500;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
    }
    .refresh-btn:active {
      background: rgba(255,255,255,0.15);
    }

    .stations-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .station-card {
      background: rgba(28,28,30,0.9);
      backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: 0.2s;
    }
    .station-card.shared {
      border-color: rgba(255,159,10,0.3);
    }
    .station-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .station-name {
      font-weight: 600;
      font-size: 16px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .distance {
      font-size: 12px;
      color: #aeaeb2;
      background: rgba(255,255,255,0.06);
      padding: 4px 10px;
      border-radius: 16px;
    }

    .queue-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .queue-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      border: 1px solid transparent;
    }
    .queue-low { background: rgba(48,209,88,0.15); color: #30d158; border-color: rgba(48,209,88,0.3); }
    .queue-medium { background: rgba(255,159,10,0.15); color: #ff9f0a; border-color: rgba(255,159,10,0.3); }
    .queue-high { background: rgba(255,69,58,0.15); color: #ff453a; border-color: rgba(255,69,58,0.3); }
    .queue-none { background: rgba(255,255,255,0.05); color: #8e8e93; }

    .expire-badge {
      font-size: 11px;
      background: rgba(255,255,255,0.08);
      padding: 3px 10px;
      border-radius: 12px;
      color: #aeaeb2;
    }
    .shared-badge {
      font-size: 10px;
      background: rgba(255,159,10,0.2);
      color: #ff9f0a;
      padding: 3px 8px;
      border-radius: 10px;
    }

    .fuel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .fuel-tag {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      color: #d1d1d6;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .fuel-tag.missing {
      opacity: 0.4;
      text-decoration: line-through;
    }

    .update-btn {
      background: #ff9f0a;
      border: none;
      color: #000000;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: 0.2s;
      margin-top: 4px;
    }
    .update-btn:active {
      background: #ffb340;
    }

    .footer {
      padding: 12px 20px;
      font-size: 11px;
      color: #636366;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Модальное окно */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-sheet {
      background: #1c1c1e;
      width: 100%;
      max-width: 430px;
      border-radius: 28px 28px 0 0;
      padding: 24px 20px 30px;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
      transform: translateY(100%);
      transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .active .modal-sheet {
      transform: translateY(0);
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: #48484a;
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
    }
    .queue-options {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .queue-opt {
      flex: 1;
      text-align: center;
      padding: 12px 6px;
      border-radius: 16px;
      background: #2c2c2e;
      font-weight: 600;
      color: #ccc;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .queue-opt.selected {
      background: #ff9f0a;
      color: #000;
      border-color: #ff9f0a;
    }
    .fuel-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }
    .fuel-check {
      background: #2c2c2e;
      padding: 8px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
    }
    .save-btn {
      background: #ff9f0a;
      color: black;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 28px;
      font-weight: 700;
      font-size: 16px;
      margin-top: 10px;
    }
    .cancel-btn {
      background: transparent;
      border: none;
      color: #ff9f0a;
      width: 100%;
      margin-top: 12px;
      font-size: 15px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="content">
    <div class="header">
      <h1><i class="fas fa-gas-pump"></i> АЗС</h1>
      <div class="location-badge" id="locationDisplay">
        <i class="fas fa-location-dot"></i> <span id="cityName">Определение...</span>
      </div>
    </div>
    <div class="status-bar">
      <span class="online-badge" id="connectionStatus">
        <i class="fas fa-circle"></i> Подключение...
      </span>
      <button class="refresh-btn" id="refreshGeoBtn"><i class="fas fa-sync-alt"></i> Обновить</button>
    </div>
    <div class="stations-list" id="stationsContainer">
      <div style="color:#8e8e93; text-align:center; padding:40px;">Загрузка ближайших АЗС...</div>
    </div>
    <div class="footer">
      <span>⏱ Данные живут 30 мин</span>
      <span style="color:#ff9f0a;">👥 Общая база</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalStationTitle">АЗС</div>
    <div style="color:#aaa; margin-bottom:8px; font-size:14px;">Очередь (увидят все):</div>
    <div class="queue-options" id="queueOptions">
      <div class="queue-opt" data-queue="low"><i class="fas fa-user"></i> Малая</div>
      <div class="queue-opt" data-queue="medium"><i class="fas fa-user-friends"></i> Средняя</div>
      <div class="queue-opt" data-queue="high"><i class="fas fa-users"></i> Большая</div>
    </div>
    <div style="color:#aaa; margin:16px 0 8px; font-size:14px;">В наличии (снимите галочку, если нет):</div>
    <div class="fuel-checkboxes" id="fuelCheckboxes"></div>
    <button class="save-btn" id="saveModalBtn">Сохранить для всех</button>
    <button class="cancel-btn" id="closeModalBtn">Отмена</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, onDisconnect, serverTimestamp, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAoMntaBJd9YJd9PzrTao0dvl1sPbFYVMI",
    authDomain: "project-3797590376463361850.firebaseapp.com",
    databaseURL: "https://project-3797590376463361850-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "project-3797590376463361850",
    storageBucket: "project-3797590376463361850.firebasestorage.app",
    messagingSenderId: "995163864050",
    appId: "1:995163864050:web:9f98757570e34afff4496b"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  const FUEL_TYPES = ['АИ-92', 'АИ-95', 'АИ-98', 'ДТ', 'Газ'];
  let currentLat = null;
  let currentLon = null;
  let currentCity = 'Москва';
  let editingStationId = null;
  let userPresenceRef = null;
  let stationsListener = null;

  // Функция вычисления расстояния
  function calcDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) ** 2;
    return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
  }

  // Экспоненциальный вес свежести
  function getFreshnessWeight(updatedAt) {
    if (!updatedAt) return 0;
    const minutes = (Date.now() - updatedAt) / 60000;
    return Math.max(0, Math.pow(2, -minutes / 30));
  }

  // Подключение к Firebase и отображение статуса
  function updateConnectionStatus(status) {
    const statusEl = document.getElementById('connectionStatus');
    if (status === 'connected') {
      statusEl.innerHTML = '<i class="fas fa-circle" style="color:#30d158;"></i> Онлайн';
      statusEl.className = 'online-badge';
    } else {
      statusEl.innerHTML = '<i class="fas fa-circle" style="color:#ff453a;"></i> Офлайн';
      statusEl.className = 'online-badge';
      statusEl.style.background = 'rgba(255,69,58,0.15)';
      statusEl.style.color = '#ff453a';
    }
  }

  // Слушаем изменения в Firebase
  function listenToStations() {
    const stationsRef = ref(database, 'stations');
    
    if (stationsListener) {
      // Отписываемся от предыдущего слушателя
      stationsRef.off('value', stationsListener);
    }
    
    stationsListener = onValue(stationsRef, (snapshot) => {
      const data = snapshot.val();
      const stations = [];
      
      if (data) {
        Object.keys(data).forEach(key => {
          stations.push({
            id: key,
            ...data[key]
          });
        });
      }
      
      renderStations(stations);
    }, (error) => {
      console.error('Ошибка чтения из Firebase:', error);
      updateConnectionStatus('disconnected');
    });
  }

  // Поиск реальных АЗС через OpenStreetMap
  async function fetchNearbyStations(lat, lon) {
    try {
      const query = `
        [out:json];
        (
          node["amenity"="fuel"](around:5000, ${lat}, ${lon});
          way["amenity"="fuel"](around:5000, ${lat}, ${lon});
          relation["amenity"="fuel"](around:5000, ${lat}, ${lon});
        );
        out center 20;
      `;
      
      const response = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: query
      });
      
      if (!response.ok) throw new Error('API error');
      
      const data = await response.json();
      
      for (const element of data.elements) {
        const osmId = `${element.type}/${element.id}`;
        const lat = element.lat || element.center?.lat;
        const lon = element.lon || element.center?.lon;
        
        if (!lat || !lon) continue;
        
        const name = element.tags?.name || 
                    element.tags?.brand || 
                    element.tags?.operator || 
                    'АЗС';
        
        // Проверяем, существует ли уже станция в Firebase
        const stationRef = ref(database, `stations/${osmId.replace(/\//g, '_')}`);
        
        // Используем update вместо set, чтобы не перезаписывать данные других пользователей
        const updates = {};
        updates[`stations/${osmId.replace(/\//g, '_')}/name`] = name;
        updates[`stations/${osmId.replace(/\//g, '_')}/lat`] = lat;
        updates[`stations/${osmId.replace(/\//g, '_')}/lon`] = lon;
        updates[`stations/${osmId.replace(/\//g, '_')}/osmId`] = osmId;
        
        await update(ref(database), updates);
      }
      
      updateConnectionStatus('connected');
    } catch (error) {
      console.error('Ошибка загрузки АЗС:', error);
    }
  }

  // Определение города
  async function getCityFromCoords(lat, lon) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru`
      );
      const data = await response.json();
      return data?.address?.city || 
             data?.address?.town || 
             data?.address?.village || 
             'Неизвестно';
    } catch (e) {
      return 'Москва';
    }
  }

  // Запрос геолокации
  function requestGeolocation() {
    if (!navigator.geolocation) {
      document.getElementById('cityName').textContent = 'Нет доступа';
      return;
    }
    
    document.getElementById('cityName').textContent = 'Поиск...';
    
    navigator.geolocation.getCurrentPosition(
      async (position) => {
        currentLat = position.coords.latitude;
        currentLon = position.coords.longitude;
        
        const city = await getCityFromCoords(currentLat, currentLon);
        currentCity = city;
        document.getElementById('cityName').textContent = city;
        
        // Загружаем реальные АЗС в Firebase
        await fetchNearbyStations(currentLat, currentLon);
        
        // Отмечаем присутствие пользователя
        const presenceRef = ref(database, 'users/' + Date.now());
        set(presenceRef, {
          lat: currentLat,
          lon: currentLon,
          lastSeen: serverTimestamp()
        });
        onDisconnect(presenceRef).remove();
      },
      (error) => {
        console.error('Ошибка геолокации:', error);
        currentLat = 55.7558;
        currentLon = 37.6173;
        currentCity = 'Москва';
        document.getElementById('cityName').textContent = 'Москва';
        fetchNearbyStations(currentLat, currentLon);
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 300000
      }
    );
  }

  // Отрисовка списка станций
  function renderStations(stations) {
    const container = document.getElementById('stationsContainer');
    
    if (!stations || !stations.length) {
      container.innerHTML = '<div style="color:#8e8e93; text-align:center; padding:40px;">Нет АЗС поблизости</div>';
      return;
    }

    // Сортируем по расстоянию
    const sorted = [...stations].sort((a, b) => {
      if (!currentLat || !currentLon) return 0;
      const distA = parseFloat(calcDistance(currentLat, currentLon, a.lat, a.lon));
      const distB = parseFloat(calcDistance(currentLat, currentLon, b.lat, b.lon));
      return distA - distB;
    });

    container.innerHTML = sorted.map(station => {
      const distance = (currentLat && currentLon) 
        ? calcDistance(currentLat, currentLon, station.lat, station.lon) 
        : '?';
      
      const weight = getFreshnessWeight(station.queueUpdatedAt);
      const queueText = station.queue 
        ? { low: 'Маленькая', medium: 'Средняя', high: 'Большая' }[station.queue] 
        : 'Нет данных';
      const queueClass = station.queue ? `queue-${station.queue}` : 'queue-none';
      
      const timeAgo = station.queueUpdatedAt 
        ? Math.floor((Date.now() - station.queueUpdatedAt) / 60000) 
        : null;
      
      const fuels = station.fuels || {};
      const fuelsHtml = FUEL_TYPES.map(type => {
        const available = fuels[type] !== false;
        return `<span class="fuel-tag ${!available ? 'missing' : ''}">
          ${type} ${available ? '<i class="fas fa-check" style="color:#30d158; font-size:10px;"></i>' : '<i class="fas fa-times" style="color:#ff453a; font-size:10px;"></i>'}
        </span>`;
      }).join('');

      return `
        <div class="station-card ${station.queueUpdatedAt ? 'shared' : ''}">
          <div class="station-header">
            <span class="station-name">
              <i class="fas fa-gas-pump" style="color:#ff9f0a;"></i> ${station.name || 'АЗС'}
            </span>
            <span class="distance">${distance} км</span>
          </div>
          <div class="queue-row">
            <span class="queue-indicator ${queueClass}">
              <i class="fas fa-users"></i> ${queueText}
            </span>
            ${weight > 0 && weight < 0.6 ? '<span class="expire-badge">Уточняется</span>' : ''}
            ${station.queueUpdatedAt ? '<span class="shared-badge">👥 Общее</span>' : ''}
            ${timeAgo !== null ? `<span style="color:#8e8e93; font-size:11px;">${timeAgo} мин назад</span>` : ''}
          </div>
          <div class="fuel-tags">${fuelsHtml}</div>
          <button class="update-btn" data-station-id="${station.id}">
            <i class="fas fa-pen"></i> Обновить информацию
          </button>
        </div>
      `;
    }).join('');

    // Навешиваем обработчики
    document.querySelectorAll('.update-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const stationId = btn.dataset.stationId;
        openEditModal(stationId, stations);
      });
    });
  }

  // Модальное окно редактирования
  function openEditModal(stationId, stations) {
    const station = stations.find(s => s.id === stationId);
    if (!station) return;
    
    editingStationId = stationId;
    document.getElementById('modalStationTitle').textContent = station.name || 'АЗС';
    
    // Очередь
    document.querySelectorAll('#queueOptions .queue-opt').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.queue === station.queue);
    });
    
    // Топливо
    const fuelContainer = document.getElementById('fuelCheckboxes');
    const fuels = station.fuels || {};
    fuelContainer.innerHTML = FUEL_TYPES.map(type => {
      const checked = fuels[type] !== false;
      return `<label class="fuel-check">
        <input type="checkbox" data-fuel="${type}" ${checked ? 'checked' : ''}> ${type}
      </label>`;
    }).join('');
    
    document.getElementById('editModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
    editingStationId = null;
  }

  // Сохранение в Firebase
  async function saveToFirebase(stationId, queue, fuels) {
    try {
      const updates = {};
      updates[`stations/${stationId}/queue`] = queue;
      updates[`stations/${stationId}/queueUpdatedAt`] = Date.now();
      updates[`stations/${stationId}/fuels`] = fuels;
      
      await update(ref(database), updates);
      updateConnectionStatus('connected');
    } catch (error) {
      console.error('Ошибка сохранения:', error);
      alert('Не удалось сохранить данные. Проверьте подключение к интернету.');
    }
  }

  // Обработчики событий
  document.getElementById('queueOptions').addEventListener('click', (e) => {
    const opt = e.target.closest('.queue-opt');
    if (!opt) return;
    document.querySelectorAll('#queueOptions .queue-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });

  document.getElementById('saveModalBtn').addEventListener('click', async () => {
    if (!editingStationId) return;
    
    const selectedQueue = document.querySelector('#queueOptions .queue-opt.selected')?.dataset.queue || null;
    const fuels = {};
    
    document.querySelectorAll('#fuelCheckboxes input').forEach(checkbox => {
      fuels[checkbox.dataset.fuel] = checkbox.checked;
    });
    
    await saveToFirebase(editingStationId, selectedQueue, fuels);
    closeModal();
  });

  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editModal')) closeModal();
  });

  document.getElementById('refreshGeoBtn').addEventListener('click', requestGeolocation);

  // Периодическое обновление интерфейса
  setInterval(() => {
    if (currentLat && currentLon) {
      fetchNearbyStations(currentLat, currentLon);
    }
  }, 300000); // Каждые 5 минут обновляем список АЗС

  // Запуск
  listenToStations();
  requestGeolocation();
  
  // Мониторинг подключения
  const connectedRef = ref(database, '.info/connected');
  onValue(connectedRef, (snap) => {
    if (snap.val() === true) {
      updateConnectionStatus('connected');
    } else {
      updateConnectionStatus('disconnected');
    }
  });
</script>
</body>
</html>
