<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>АЗС • Очереди и топливо</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0;
      margin: 0;
      transition: background 0.3s ease;
      background: var(--tg-theme-bg-color, #f2f2f7);
    }

    body.dark {
      background: var(--tg-theme-bg-color, #000000);
    }

    .app {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: all 0.3s ease;
      background: var(--tg-theme-bg-color, #ffffff);
    }

    body.dark .app {
      background: var(--tg-theme-bg-color, #0d0d0f);
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      background: var(--tg-theme-secondary-bg-color, transparent);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--tg-theme-text-color, #1d1d1f);
    }

    body.dark .header h1 {
      color: var(--tg-theme-text-color, #ffffff);
    }

    .header h1 i {
      color: #ff9500;
      font-size: 22px;
    }

    .stations-count {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    body.dark .stations-count {
      background: rgba(255,255,255,0.1);
    }

    .location-badge {
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #1d1d1f);
    }

    body.dark .location-badge {
      background: rgba(255,255,255,0.1);
      color: var(--tg-theme-text-color, #e5e5e7);
    }

    .location-badge i {
      color: #ff9500;
    }

    .search-bar {
      margin: 0 16px 12px;
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid var(--tg-theme-hint-color, #e5e5ea);
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #1d1d1f);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: 0.2s;
    }

    body.dark .search-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ffffff;
    }

    .search-input:focus {
      border-color: #ff9500;
    }

    .filter-btn {
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid var(--tg-theme-hint-color, #e5e5ea);
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #1d1d1f);
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    body.dark .filter-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ffffff;
    }

    .filter-btn.active {
      background: #ff9500;
      border-color: #ff9500;
      color: #ffffff;
    }

    .status-bar {
      margin: 0 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    body.dark .status-bar {
      color: var(--tg-theme-hint-color, #98989e);
    }

    .connection-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
    }

    .connection-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #30d158;
    }

    .connection-dot.offline {
      background: #ff453a;
    }

    .refresh-btn {
      border: none;
      font-weight: 500;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #1d1d1f);
    }

    body.dark .refresh-btn {
      background: rgba(255,255,255,0.08);
      color: var(--tg-theme-text-color, #ffffff);
    }

    .refresh-btn:active {
      opacity: 0.7;
    }

    .stations-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .station-card {
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: 0.2s;
      background: var(--tg-theme-bg-color, #ffffff);
      border: 1px solid var(--tg-theme-hint-color, #e5e5ea);
    }

    body.dark .station-card {
      background: var(--tg-theme-secondary-bg-color, #1c1c1e);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .station-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .station-info {
      flex: 1;
    }

    .station-name {
      font-weight: 600;
      font-size: 15px;
      line-height: 1.3;
      color: var(--tg-theme-text-color, #1d1d1f);
    }

    body.dark .station-name {
      color: var(--tg-theme-text-color, #ffffff);
    }

    .station-address {
      font-size: 11px;
      margin-top: 2px;
      line-height: 1.4;
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    body.dark .station-address {
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    .distance {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 12px;
      white-space: nowrap;
      color: var(--tg-theme-hint-color, #6e6e73);
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
    }

    body.dark .distance {
      color: #aeaeb2;
      background: rgba(255,255,255,0.06);
    }

    .queue-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .queue-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 12px;
    }

    .queue-low {
      background: rgba(48,209,88,0.12);
      color: #248a3d;
    }

    body.dark .queue-low {
      background: rgba(48,209,88,0.15);
      color: #30d158;
    }

    .queue-medium {
      background: rgba(255,159,10,0.12);
      color: #cc7a00;
    }

    body.dark .queue-medium {
      background: rgba(255,159,10,0.15);
      color: #ff9f0a;
    }

    .queue-high {
      background: rgba(255,69,58,0.12);
      color: #d63025;
    }

    body.dark .queue-high {
      background: rgba(255,69,58,0.15);
      color: #ff453a;
    }

    .queue-none {
      background: rgba(142,142,147,0.1);
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    .time-ago {
      font-size: 10px;
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    body.dark .time-ago {
      color: #636366;
    }

    .fuel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .fuel-tag {
      border-radius: 14px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #3a3a3c);
    }

    body.dark .fuel-tag {
      background: rgba(255,255,255,0.06);
      color: #d1d1d6;
    }

    .fuel-tag.available i {
      color: #30d158;
      font-size: 9px;
    }

    .fuel-tag.missing {
      opacity: 0.4;
      text-decoration: line-through;
    }

    .fuel-tag.missing i {
      color: #ff453a;
      font-size: 9px;
    }

    .update-btn {
      background: var(--tg-theme-button-color, #ff9500);
      border: none;
      color: var(--tg-theme-button-text-color, #ffffff);
      font-weight: 600;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: 0.2s;
      margin-top: 2px;
      font-family: 'Inter', sans-serif;
    }

    .update-btn:active {
      opacity: 0.8;
    }

    .footer {
      padding: 10px 16px;
      font-size: 10px;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--tg-theme-hint-color, #aeaeb2);
      border-top: 1px solid var(--tg-theme-hint-color, #e5e5ea);
    }

    body.dark .footer {
      color: #636366;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    body.dark .modal-overlay {
      background: rgba(0,0,0,0.7);
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-sheet {
      width: 100%;
      max-width: 500px;
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 24px;
      transform: translateY(100%);
      transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      background: var(--tg-theme-bg-color, #ffffff);
    }

    body.dark .modal-sheet {
      background: var(--tg-theme-secondary-bg-color, #1c1c1e);
    }

    .active .modal-sheet {
      transform: translateY(0);
    }

    .modal-handle {
      width: 32px;
      height: 4px;
      border-radius: 2px;
      margin: 0 auto 16px;
      background: var(--tg-theme-hint-color, #d1d1d6);
    }

    body.dark .modal-handle {
      background: #48484a;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--tg-theme-text-color, #1d1d1f);
    }

    body.dark .modal-title {
      color: var(--tg-theme-text-color, #ffffff);
    }

    .modal-label {
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--tg-theme-hint-color, #6e6e73);
    }

    body.dark .modal-label {
      color: #aeaeb2;
    }

    .queue-options {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .queue-opt {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #3a3a3c);
    }

    body.dark .queue-opt {
      background: #2c2c2e;
      color: #ccc;
    }

    .queue-opt.selected {
      background: var(--tg-theme-button-color, #ff9500);
      color: var(--tg-theme-button-text-color, #ffffff);
      border-color: var(--tg-theme-button-color, #ff9500);
    }

    .fuel-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0 16px;
    }

    .fuel-check {
      padding: 8px 12px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #1d1d1f);
    }

    body.dark .fuel-check {
      background: #2c2c2e;
      color: #ffffff;
    }

    .fuel-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--tg-theme-button-color, #ff9500);
    }

    .save-btn {
      background: var(--tg-theme-button-color, #ff9500);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }

    .save-btn:active {
      opacity: 0.8;
    }

    .cancel-btn {
      background: transparent;
      border: none;
      color: var(--tg-theme-button-color, #ff9500);
      width: 100%;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .loading-state {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.6;
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    @supports (padding: env(safe-area-inset-bottom)) {
      .footer {
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="content">
    <div class="header">
      <div class="header-left">
        <h1><i class="fas fa-gas-pump"></i> АЗС</h1>
        <span class="stations-count" id="stationsCount">0 АЗС</span>
      </div>
      <div class="location-badge" id="locationDisplay">
        <i class="fas fa-location-dot"></i> 
        <span id="cityName">Определение...</span>
      </div>
    </div>
    
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск АЗС по названию или адресу...">
      <button class="filter-btn" id="filterBtn" title="Фильтр по наличию очереди">
        <i class="fas fa-filter"></i>
      </button>
    </div>
    
    <div class="status-bar">
      <div class="connection-indicator" id="connectionStatus">
        <span class="connection-dot" id="connectionDot"></span>
        <span id="connectionText">Подключение...</span>
      </div>
      <button class="refresh-btn" id="refreshGeoBtn">
        <i class="fas fa-sync-alt"></i> Обновить
      </button>
    </div>
    <div class="stations-list" id="stationsContainer">
      <div class="loading-state">
        <i class="fas fa-spinner fa-pulse" style="font-size: 24px; margin-bottom: 12px; display: block;"></i>
        Загрузка всех АЗС через Яндекс.Карты...
      </div>
    </div>
    <div class="footer">
      <span>Данные актуальны 30 минут</span>
      <span>Общая база данных</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalStationTitle">АЗС</div>
    <div class="modal-label">Размер очереди:</div>
    <div class="queue-options" id="queueOptions">
      <div class="queue-opt" data-queue="low">Малая</div>
      <div class="queue-opt" data-queue="medium">Средняя</div>
      <div class="queue-opt" data-queue="high">Большая</div>
    </div>
    <div class="modal-label">Наличие топлива:</div>
    <div class="fuel-checkboxes" id="fuelCheckboxes"></div>
    <button class="save-btn" id="saveModalBtn">Сохранить</button>
    <button class="cancel-btn" id="closeModalBtn">Отмена</button>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAoMntaBJd9YJd9PzrTao0dvl1sPbFYVMI",
    authDomain: "project-3797590376463361850.firebaseapp.com",
    databaseURL: "https://project-3797590376463361850-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "project-3797590376463361850",
    storageBucket: "project-3797590376463361850.firebasestorage.app",
    messagingSenderId: "995163864050",
    appId: "1:995163864050:web:9f98757570e34afff4496b"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  const FUEL_TYPES = ['АИ-92', 'АИ-95', 'АИ-98', 'ДТ', 'Газ'];
  let currentLat = null;
  let currentLon = null;
  let editingStationId = null;
  let allStations = [];
  let searchQuery = '';
  let showOnlyWithQueue = false;

  // Инициализация Telegram Mini App
  let tg = window.Telegram?.WebApp;
  
  function initTelegramApp() {
    if (tg) {
      tg.ready();
      tg.expand();
      applyTelegramTheme();
      tg.onEvent('themeChanged', applyTelegramTheme);
      
      tg.BackButton.show();
      tg.BackButton.onClick(() => {
        if (document.getElementById('editModal').classList.contains('active')) {
          closeModal();
        }
      });
    }
  }

  function applyTelegramTheme() {
    if (!tg) return;
    
    const theme = tg.colorScheme;
    document.body.className = theme;
    
    document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || (theme === 'dark' ? '#000000' : '#ffffff'));
    document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || (theme === 'dark' ? '#ffffff' : '#1d1d1f'));
    document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || (theme === 'dark' ? '#8e8e93' : '#8e8e93'));
    document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#ff9500');
    document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
    document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || (theme === 'dark' ? '#1c1c1e' : '#f2f2f7'));
  }

  function detectSystemTheme() {
    if (tg) return tg.colorScheme;
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
    return 'light';
  }

  if (!tg) {
    const systemTheme = detectSystemTheme();
    document.body.className = systemTheme;
    
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        document.body.className = e.matches ? 'dark' : 'light';
      });
    }
  }

  function calcDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function getFreshnessWeight(updatedAt) {
    if (!updatedAt) return 0;
    const minutes = (Date.now() - updatedAt) / 60000;
    return Math.max(0, Math.pow(2, -minutes / 30));
  }

  function updateConnectionStatus(connected) {
    const dot = document.getElementById('connectionDot');
    const text = document.getElementById('connectionText');
    
    if (connected) {
      dot.className = 'connection-dot';
      text.textContent = 'Онлайн';
    } else {
      dot.className = 'connection-dot offline';
      text.textContent = 'Офлайн';
    }
  }

  async function getAddressFromCoords(lat, lon) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru&zoom=18`
      );
      const data = await response.json();
      if (data && data.display_name) {
        const parts = data.display_name.split(',');
        return parts.slice(0, 3).join(',').trim();
      }
      return null;
    } catch (e) {
      return null;
    }
  }

  async function getCityFromCoords(lat, lon) {
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru&zoom=10`
      );
      const data = await response.json();
      return data?.address?.city || 
             data?.address?.town || 
             data?.address?.village || 
             data?.address?.county || 
             'Неизвестно';
    } catch (e) {
      return 'Москва';
    }
  }

  function listenToStations() {
    const stationsRef = ref(database, 'stations');
    
    onValue(stationsRef, async (snapshot) => {
      const data = snapshot.val();
      const stations = [];
      
      if (data) {
        for (const key of Object.keys(data)) {
          const station = data[key];
          if (!station.address && station.lat && station.lon) {
            const address = await getAddressFromCoords(station.lat, station.lon);
            if (address) {
              station.address = address;
              const updates = {};
              updates[`stations/${key}/address`] = address;
              update(ref(database), updates);
            }
          }
          stations.push({
            id: key,
            ...station
          });
        }
      }
      
      allStations = stations;
      renderFilteredStations();
    }, (error) => {
      console.error('Ошибка чтения из Firebase:', error);
      updateConnectionStatus(false);
    });
  }

  // Получение АЗС через Яндекс.Карты API и OpenStreetMap
  async function fetchAllNearbyStations(lat, lon) {
    try {
      // Используем несколько источников для максимального покрытия
      await Promise.all([
        fetchFromOpenStreetMap(lat, lon),
        fetchFromYandexMaps(lat, lon)
      ]);
      
      updateConnectionStatus(true);
    } catch (error) {
      console.error('Ошибка загрузки АЗС:', error);
    }
  }

  async function fetchFromOpenStreetMap(lat, lon) {
    try {
      const query = `
        [out:json];
        (
          node["amenity"="fuel"](around:10000, ${lat}, ${lon});
          way["amenity"="fuel"](around:10000, ${lat}, ${lon});
          relation["amenity"="fuel"](around:10000, ${lat}, ${lon});
        );
        out center 50;
      `;
      
      const response = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: query
      });
      
      if (!response.ok) throw new Error('API error');
      
      const data = await response.json();
      await processStations(data.elements);
    } catch (error) {
      console.error('Ошибка OpenStreetMap:', error);
    }
  }

  async function fetchFromYandexMaps(lat, lon) {
    try {
      // Поиск через Яндекс.Карты API (используем публичный поиск)
      const bbox = `${lon-0.1},${lat-0.1}~${lon+0.1},${lat+0.1}`;
      const response = await fetch(
        `https://search-maps.yandex.ru/v1/?text=АЗС&type=biz&lang=ru_RU&bbox=${bbox}&results=50&apikey=047d47e1-7e90-4b8d-861a-8003ecd2db78`
      );
      
      if (!response.ok) {
        // Если API ключ не настроен, используем альтернативный метод
        await fetchFromYandexAlternative(lat, lon);
        return;
      }
      
      const data = await response.json();
      if (data.features) {
        const stations = data.features.map(feature => ({
          type: 'node',
          id: feature.properties.id,
          lat: feature.geometry.coordinates[1],
          lon: feature.geometry.coordinates[0],
          tags: {
            name: feature.properties.name,
            description: feature.properties.description
          }
        }));
        await processStations(stations);
      }
    } catch (error) {
      console.error('Ошибка Яндекс.Карт:', error);
      await fetchFromYandexAlternative(lat, lon);
    }
  }

  async function fetchFromYandexAlternative(lat, lon) {
    // Используем публичный поиск Яндекса как альтернативу
    try {
      const response = await fetch(
        `https://yandex.ru/maps/api/search?text=АЗС&type=geo&lang=ru&ll=${lon},${lat}&spn=0.1,0.1&results=50`
      );
      
      if (!response.ok) return;
      
      const text = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/xml');
      const features = doc.querySelectorAll('feature');
      
      const stations = Array.from(features).map(feature => ({
        type: 'node',
        id: feature.querySelector('id')?.textContent || Math.random().toString(),
        lat: parseFloat(feature.querySelector('pos')?.textContent?.split(' ')[1] || 0),
        lon: parseFloat(feature.querySelector('pos')?.textContent?.split(' ')[0] || 0),
        tags: {
          name: feature.querySelector('name')?.textContent || 'АЗС'
        }
      }));
      
      await processStations(stations);
    } catch (error) {
      console.error('Ошибка альтернативного поиска:', error);
    }
  }

  async function processStations(elements) {
    for (const element of elements) {
      const stationLat = element.lat || element.center?.lat;
      const stationLon = element.lon || element.center?.lon;
      
      if (!stationLat || !stationLon) continue;
      
      const name = element.tags?.name || 
                  element.tags?.brand || 
                  element.tags?.operator || 
                  'АЗС';
      
      const osmId = element.id?.toString() || `${stationLat},${stationLon}`;
      const firebaseId = osmId.replace(/[\/.]/g, '_');
      const stationRef = ref(database, `stations/${firebaseId}`);
      const snapshot = await get(stationRef);
      const existingData = snapshot.val();
      
      const updates = {};
      updates[`stations/${firebaseId}/name`] = name;
      updates[`stations/${firebaseId}/lat`] = stationLat;
      updates[`stations/${firebaseId}/lon`] = stationLon;
      
      if (!existingData || !existingData.address) {
        const address = await getAddressFromCoords(stationLat, stationLon);
        if (address) {
          updates[`stations/${firebaseId}/address`] = address;
        }
      }
      
      if (!existingData || !existingData.fuels) {
        const defaultFuels = {};
        FUEL_TYPES.forEach(f => defaultFuels[f] = true);
        updates[`stations/${firebaseId}/fuels`] = defaultFuels;
      }
      
      await update(ref(database), updates);
    }
  }

  function requestGeolocation() {
    if (tg && tg.LocationManager) {
      tg.LocationManager.getLocation((location) => {
        if (location) {
          currentLat = location.latitude;
          currentLon = location.longitude;
          handleLocationUpdate();
        }
      });
      return;
    }
    
    if (!navigator.geolocation) {
      document.getElementById('cityName').textContent = 'Нет доступа';
      updateConnectionStatus(false);
      return;
    }
    
    document.getElementById('cityName').textContent = 'Поиск...';
    
    navigator.geolocation.getCurrentPosition(
      async (position) => {
        currentLat = position.coords.latitude;
        currentLon = position.coords.longitude;
        await handleLocationUpdate();
      },
      (error) => {
        console.error('Ошибка геолокации:', error);
        currentLat = 55.7558;
        currentLon = 37.6173;
        document.getElementById('cityName').textContent = 'Москва';
        fetchAllNearbyStations(currentLat, currentLon);
        updateConnectionStatus(true);
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 300000
      }
    );
  }

  async function handleLocationUpdate() {
    const city = await getCityFromCoords(currentLat, currentLon);
    document.getElementById('cityName').textContent = city;
    await fetchAllNearbyStations(currentLat, currentLon);
    updateConnectionStatus(true);
  }

  function renderFilteredStations() {
    let filtered = [...allStations].filter(s => s.lat && s.lon);
    
    // Поиск
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(s => 
        (s.name && s.name.toLowerCase().includes(q)) ||
        (s.address && s.address.toLowerCase().includes(q))
      );
    }
    
    // Фильтр по наличию очереди
    if (showOnlyWithQueue) {
      filtered = filtered.filter(s => s.queue && s.queueUpdatedAt);
    }
    
    // Сортировка по расстоянию
    if (currentLat && currentLon) {
      filtered.sort((a, b) => {
        const distA = calcDistance(currentLat, currentLon, a.lat, a.lon);
        const distB = calcDistance(currentLat, currentLon, b.lat, b.lon);
        return distA - distB;
      });
    }
    
    document.getElementById('stationsCount').textContent = `${filtered.length} АЗС`;
    renderStations(filtered);
  }

  function renderStations(stations) {
    const container = document.getElementById('stationsContainer');
    
    if (!stations || !stations.length) {
      container.innerHTML = '<div class="loading-state">Нет АЗС поблизости</div>';
      return;
    }

    container.innerHTML = stations.map(station => {
      const distance = (currentLat && currentLon && station.lat && station.lon) 
        ? calcDistance(currentLat, currentLon, station.lat, station.lon).toFixed(1)
        : '?';
      
      const weight = getFreshnessWeight(station.queueUpdatedAt);
      const queueText = station.queue 
        ? { low: 'Маленькая', medium: 'Средняя', high: 'Большая' }[station.queue] 
        : 'Нет данных';
      const queueClass = station.queue ? `queue-${station.queue}` : 'queue-none';
      
      const timeAgo = station.queueUpdatedAt 
        ? Math.floor((Date.now() - station.queueUpdatedAt) / 60000) 
        : null;
      
      const fuels = station.fuels || {};
      const fuelsHtml = FUEL_TYPES.map(type => {
        const available = fuels[type] !== false;
        return `<span class="fuel-tag ${available ? 'available' : 'missing'}">
          ${type}
          <i class="fas ${available ? 'fa-check' : 'fa-times'}"></i>
        </span>`;
      }).join('');

      return `
        <div class="station-card">
          <div class="station-header">
            <div class="station-info">
              <div class="station-name">${station.name || 'АЗС'}</div>
              ${station.address ? `<div class="station-address">${station.address}</div>` : ''}
            </div>
            <span class="distance">${distance} км</span>
          </div>
          <div class="queue-row">
            <span class="queue-indicator ${queueClass}">
              <i class="fas fa-users"></i> ${queueText}
            </span>
            ${weight > 0 && weight < 0.6 ? '<span class="time-ago">Уточняется</span>' : ''}
            ${timeAgo !== null ? `<span class="time-ago">${timeAgo} мин назад</span>` : ''}
          </div>
          <div class="fuel-tags">${fuelsHtml}</div>
          <button class="update-btn" data-station-id="${station.id}">
            <i class="fas fa-pen"></i> Обновить
          </button>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.update-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const stationId = btn.dataset.stationId;
        openEditModal(stationId);
      });
    });
  }

  function openEditModal(stationId) {
    const station = allStations.find(s => s.id === stationId);
    if (!station) return;
    
    editingStationId = stationId;
    document.getElementById('modalStationTitle').textContent = station.name || 'АЗС';
    
    document.querySelectorAll('#queueOptions .queue-opt').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.queue === station.queue);
    });
    
    const fuelContainer = document.getElementById('fuelCheckboxes');
    const fuels = station.fuels || {};
    fuelContainer.innerHTML = FUEL_TYPES.map(type => {
      const checked = fuels[type] !== false;
      return `<label class="fuel-check">
        <input type="checkbox" data-fuel="${type}" ${checked ? 'checked' : ''}> ${type}
      </label>`;
    }).join('');
    
    document.getElementById('editModal').classList.add('active');
    
    if (tg) {
      tg.BackButton.show();
    }
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
    editingStationId = null;
    
    if (tg) {
      tg.BackButton.hide();
    }
  }

  async function saveToFirebase(stationId, queue, fuels) {
    try {
      const updates = {};
      updates[`stations/${stationId}/queue`] = queue || null;
      updates[`stations/${stationId}/queueUpdatedAt`] = Date.now();
      updates[`stations/${stationId}/fuels`] = fuels;
      
      await update(ref(database), updates);
      updateConnectionStatus(true);
      
      if (tg) {
        tg.showPopup({
          title: 'Сохранено',
          message: 'Данные обновлены и видны всем пользователям',
          buttons: [{type: 'ok'}]
        });
      }
    } catch (error) {
      console.error('Ошибка сохранения:', error);
      if (tg) {
        tg.showPopup({
          title: 'Ошибка',
          message: 'Не удалось сохранить данные. Проверьте подключение.',
          buttons: [{type: 'ok'}]
        });
      }
    }
  }

  // Обработчики событий
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderFilteredStations();
  });

  document.getElementById('filterBtn').addEventListener('click', () => {
    showOnlyWithQueue = !showOnlyWithQueue;
    const btn = document.getElementById('filterBtn');
    if (showOnlyWithQueue) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
    renderFilteredStations();
  });

  document.getElementById('queueOptions').addEventListener('click', (e) => {
    const opt = e.target.closest('.queue-opt');
    if (!opt) return;
    document.querySelectorAll('#queueOptions .queue-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });

  document.getElementById('saveModalBtn').addEventListener('click', async () => {
    if (!editingStationId) return;
    
    const selectedQueue = document.querySelector('#queueOptions .queue-opt.selected')?.dataset.queue || null;
    const fuels = {};
    
    document.querySelectorAll('#fuelCheckboxes input').forEach(checkbox => {
      fuels[checkbox.dataset.fuel] = checkbox.checked;
    });
    
    await saveToFirebase(editingStationId, selectedQueue, fuels);
    closeModal();
  });

  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editModal')) closeModal();
  });

  document.getElementById('refreshGeoBtn').addEventListener('click', () => {
    requestGeolocation();
  });

  document.getElementById('locationDisplay').addEventListener('click', () => {
    requestGeolocation();
  });

  setInterval(() => {
    if (currentLat && currentLon) {
      fetchAllNearbyStations(currentLat, currentLon);
    }
  }, 600000);

  const connectedRef = ref(database, '.info/connected');
  onValue(connectedRef, (snap) => {
    updateConnectionStatus(snap.val() === true);
  });

  // Запуск приложения
  initTelegramApp();
  listenToStations();
  requestGeolocation();
</script>
</body>
</html>
